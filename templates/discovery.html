<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}?v=20260403-discovery4">
</head>
<body>
    <header class="topbar">
        <div class="brand">SMP</div>
        <nav class="nav">
            <a href="/">Dashboard</a>
            <a href="/services/dashboard">Services Dashboard</a>
            <a href="/topology">Topology</a>
            <a href="/discovery">Discovery</a>
            <a href="#health">Health</a>
            <a href="#admin">Admin</a>
        </nav>
    </header>

    <main class="container discovery-page" id="discovery-root">
        <div class="discovery-header">
            <div class="discovery-header-left">
                <h1 class="discovery-title">Network Discovery</h1>
                <select id="discovery-root-select" class="discovery-select">
                    <option value="">Select root node...</option>
                </select>
            </div>
            <div class="discovery-header-right">
                <div class="discovery-spread-controls">
                    <button id="discovery-contract" class="discovery-spread-btn" title="Contract graph">−</button>
                    <span id="discovery-spread-label" class="discovery-spread-value">100%</span>
                    <button id="discovery-expand" class="discovery-spread-btn" title="Expand graph">+</button>
                </div>
                <input type="text" id="discovery-search" class="discovery-search" placeholder="Search site ID..." autocomplete="off">
                <label class="discovery-toggle-label">
                    <input type="checkbox" id="discovery-show-labels">
                    <span>Show IDs</span>
                </label>
            </div>
        </div>
        <div class="discovery-stage" id="discovery-stage">
            <div id="discovery-zoom-container">
                <svg id="discovery-links"></svg>
                <div id="discovery-node-layer"></div>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', path='js/app.js') }}?v=20260403-discovery4"></script>
</body>
</html>
